version: '3.8'
services:
  whatsapp-service:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on: [redis]
    volumes:
      - wa-sessions:/app/.wa-sessions
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    restart: unless-stopped
volumes:
  wa-sessions:
